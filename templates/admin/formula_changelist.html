{% extends "admin/change_list.html" %}

{% block content %}
  <div style="padding:15px;background:#f1f5fe;border:1px solid #c7d2fe;margin-bottom:15px;border-radius:10px;">
    <h3>📥 Bulk Upload Formulas (CSV)</h3>

    <form method="post" enctype="multipart/form-data" action="import-csv/">
      {% csrf_token %}
      <input type="file" name="csv_file" required>
      <button type="submit" class="button">Upload</button>
    </form>

    <p style="font-size:12px;color:#64748b;margin-top:8px;">
      CSV columns: subject, title, formula, description, school_class
    </p>
  </div>

  {{ block.super }}
{% endblock %}
